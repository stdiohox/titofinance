<svg xmlns="http://www.w3.org/2000/svg"
  width="720" height="480" viewBox="0 0 720 480">

  <!-- Cream background -->
  <rect width="720" height="480" fill="#EDE8DC"/>

  <!-- Subtle vignette -->
  <radialGradient id="v" cx="50%" cy="50%" r="70%">
    <stop offset="60%" stop-color="rgba(0,0,0,0)"/>
    <stop offset="100%" stop-color="rgba(0,0,0,0.06)"/>
  </radialGradient>
  <rect width="720" height="480" fill="url(#v)"/>

  <!-- Large faded TF text as watermark -->
  <text
    x="360" y="290"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="180"
    font-weight="700"
    fill="#2D5A27"
    opacity="0.06"
    letter-spacing="-8"
  >TF</text>

  <!-- Play button circle -->
  <circle cx="360" cy="230" r="44"
    fill="rgba(45,90,39,0.12)"
    stroke="#2D5A27"
    stroke-width="1.5"
    opacity="0.6"
  />

  <!-- Play triangle -->
  <polygon
    points="348,212 348,250 382,231"
    fill="#2D5A27"
    opacity="0.5"
  />

  <!-- Tito Finance label -->
  <text
    x="360" y="360"
    text-anchor="middle"
    font-family="Georgia, serif"
    font-size="13"
    font-weight="600"
    letter-spacing="6"
    fill="#2D5A27"
    opacity="0.4"
  >TITO FINANCE</text>

  <!-- Testimonial label -->
  <text
    x="360" y="382"
    text-anchor="middle"
    font-family="monospace"
    font-size="10"
    letter-spacing="4"
    fill="#2D5A27"
    opacity="0.3"
  >TESTIMONIAL</text>

</svg>
