<svg xmlns='http://www.w3.org/2000/svg'
  width='720' height='480' viewBox='0 0 720 480'>

  <!-- Cream background -->
  <rect width='720' height='480' fill='#EDE8DC'/>

  <!-- Subtle green gradient overlay -->
  <radialGradient id='g' cx='50%' cy='50%' r='50%'>
    <stop offset='0%' stop-color='rgba(45,90,39,0.06)'/>
    <stop offset='100%' stop-color='rgba(45,90,39,0)'/>
  </radialGradient>
  <rect width='720' height='480' fill='url(#g)'/>

  <!-- TF logo centered -->
  <image
    href='data:image/png;base64,'
    x='260' y='140'
    width='200' height='200'
    opacity='0.15'
  />

  <!-- Play button circle -->
  <circle cx='360' cy='240' r='40'
    fill='none'
    stroke='#2D5A27'
    stroke-width='2'
    opacity='0.5'
  />

  <!-- Play triangle -->
  <polygon
    points='350,222 350,258 378,240'
    fill='#2D5A27'
    opacity='0.5'
  />

  <!-- Bottom label -->
  <text
    x='360' y='390'
    text-anchor='middle'
    font-family='monospace'
    font-size='11'
    letter-spacing='3'
    fill='#2D5A27'
    opacity='0.5'
  >TESTIMONIAL</text>

</svg>